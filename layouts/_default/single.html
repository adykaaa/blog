{{ define "main" }}
<article class="post">
  <header class="post-header">
    <div class="post-meta">{{ .Date.Format "January 2, 2006" }}</div>
    <h1 class="post-headline">{{ .Title }}</h1>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
  <footer class="post-footer">
    <a href="/posts/" class="back-link">← Back to blog</a>
  </footer>
</article>
{{ end }}
