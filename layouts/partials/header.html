<header class="site-header">
  <nav class="nav">
    <div class="nav-brand">
      <a href="{{ "/" | absURL }}" class="brand-link">{{ .Site.Title }}</a>
    </div>
    <ul class="nav-menu">
      {{ range .Site.Menus.main }}
      <li class="nav-item">
        <a href="{{ .URL | absURL }}" class="nav-link{{ if eq $.RelPermalink .URL }} active{{ end }}">{{ .Name }}</a>
      </li>
      {{ end }}
    </ul>
  </nav>
</header>
